name: Build & Distribute Android App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android-app/**'

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Day auto-calculated from Eastern time midnight
          START_DATE="2026-03-30"
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          DAY=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 + 1 ))
          BUILD=${{ github.run_number }}
          VERSION="0.${DAY}.${BUILD}"
          VERSION_CODE=${BUILD}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION (code: $VERSION_CODE)"

      - name: Set version in build.gradle.kts
        run: |
          sed -i "s/versionCode = .*/versionCode = ${{ steps.version.outputs.versionCode }}/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${{ steps.version.outputs.version }}\"/" app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ steps.version.outputs.version }}
          path: android-app/app/build/outputs/apk/debug/*.apk

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: derricktwengerd@gmail.com
          file: android-app/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "v${{ steps.version.outputs.version }}"
