<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MentorDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- This content shows while React loads. React replaces it on mount. -->
      <div id="loading-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif;background:#f0f2f7">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem"></div>
          <p style="color:#6b7280;font-size:0.9rem">Loading MentorDesk...</p>
        </div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      // Global error catcher - shows errors that crash React before it can mount
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.dataset.reactMounted) {
          root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif;padding:2rem">' +
            '<div style="max-width:500px;background:#fff;border:1px solid #fecaca;border-radius:12px;padding:2rem;text-align:center">' +
            '<p style="font-weight:700;color:#dc2626;margin-bottom:0.5rem">App failed to load</p>' +
            '<pre style="background:#fef2f2;padding:0.75rem;border-radius:6px;font-size:0.78rem;color:#991b1b;text-align:left;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:auto">' + (e.message || e) + '</pre>' +
            '<button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:#6366f1;color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer">Reload</button>' +
            '</div></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
